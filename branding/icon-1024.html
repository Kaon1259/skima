<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  html, body { margin: 0; padding: 0; width: 1024px; height: 1024px; background: transparent; overflow: hidden; }
  .icon {
    width: 1024px; height: 1024px;
    background: linear-gradient(135deg, #FB923C 0%, #EA580C 100%);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
  }
  .bolt {
    position: absolute;
    width: 90%; height: 90%;
    top: 5%; left: 5%;
    filter: drop-shadow(0 24px 56px rgba(0,0,0,0.25));
  }
  .bolt path { fill: #FFEB3B; }
  .text {
    font-weight: 900;
    font-size: 440px;
    color: white;
    letter-spacing: -24px;
    z-index: 2;
    text-shadow: 0 16px 64px rgba(0,0,0,0.35);
    line-height: 1;
  }
</style>
</head>
<body>
<div class="icon">
  <svg class="bolt" viewBox="0 0 200 200" preserveAspectRatio="xMidYMid meet">
    <path d="M115 10 L70 110 L100 110 L60 200 L150 80 L115 80 Z"/>
  </svg>
  <div class="text">단바</div>
</div>
</body>
</html>
