<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  html, body { margin: 0; padding: 0; width: 1024px; height: 1024px; background: transparent; overflow: hidden; }
  .icon {
    width: 1024px; height: 1024px;
    background: linear-gradient(135deg, #FB923C 0%, #EA580C 100%);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
  }
  .bolt {
    position: absolute;
    width: 60%; height: 60%;
    top: 20%; left: 20%;
    filter: drop-shadow(0 24px 56px rgba(0,0,0,0.25));
  }
  .bolt path { fill: #FFEB3B; }
  .text {
    font-weight: 900;
    font-size: 340px;
    color: white;
    letter-spacing: -18px;
    z-index: 2;
    text-shadow: 0 16px 64px rgba(0,0,0,0.35);
    line-height: 1;
    /* 한글 받침 클리핑 방지 — 글자 박스를 약간 위로 보정 */
    transform: translateY(-8px);
  }
</style>
</head>
<body>
<div class="icon">
  <!-- 번개 path 자체를 viewBox 중앙에 가두기: 0..200 → 20..180 사용 -->
  <svg class="bolt" viewBox="0 0 200 200" preserveAspectRatio="xMidYMid meet">
    <path d="M115 30 L75 115 L100 115 L70 175 L145 90 L115 90 Z"/>
  </svg>
  <div class="text">단바</div>
</div>
</body>
</html>
