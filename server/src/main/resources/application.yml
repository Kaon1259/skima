server:
  port: 8090

spring:
  application:
    name: skima-byte
  # dev 기본 프로필 — application-local.yml(gitignored) 의 카카오/시크릿 자동 주입.
  # 운영 전환 시 SPRING_PROFILES_ACTIVE=prod 등으로 override.
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: jdbc:mysql://localhost:3306/skima_byte?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&useUnicode=true&characterEncoding=UTF-8
    username: root
    password: 1111
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # dev: create — 매 부팅마다 스키마 재생성. DataSeeder의 wipe-and-reseed 패턴과 정합.
      # 운영 전환 시 validate 또는 none + Flyway로 교체.
      ddl-auto: create
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: Asia/Seoul

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Seoul

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

# AWS S3 — 워커 프로필 / 매장 사진 업로드용.
# 자격증명은 env(AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY) 또는 IAM role 로만 주입 (yml 절대 X).
# 버킷/리전은 운영 시 env 로 override 가능.
cloud:
  aws:
    s3:
      bucket: ${AWS_S3_BUCKET:skimabyte-profile}
      region: ${AWS_S3_REGION:ap-northeast-2}

# Skima Byte 비즈니스 룰 (킥의 정량 임계값)
skima:
  matching:
    sla-minutes: 60          # 1시간 매칭 SLA
  payout:
    sla-minutes: 30          # 30분 입금 SLA (점주 승인 후)
    auto-approve-minutes: 30 # 체크아웃 후 N분 무응답 시 자동 승인 (정체성 30분 페이 보장)
    platform-fee-rate: 0.12  # 점주 수수료 12%
    daily-tax-threshold: 150000   # 일급 15만원 미만은 비과세
    daily-tax-rate: 0.066    # 일급 15만원 이상 시 6.6% 원천징수
  scheduler:
    payout-trigger-cron: "0 * * * * *"   # 매분 0초마다 정산 트리거 점검
  seed:
    refresh-on-start: true   # dev 기본값. 운영 전환 시 false 로 두고 Flyway 등으로 마이그레이션
    create-shifts-and-apps: true    # true=시드 시프트/지원 12+9건 생성 (Phase 1 카페·베이커리 6 + Phase 2 음식점·바 6) / false=비워둠
  no-show:
    grace-minutes: 30        # 시프트 시작 후 30분까지 체크인 없으면 NO_SHOW + 백업 매칭

# Kakao OAuth (워커 전용 로그인). dev 기본값은 saju 프로젝트와 같은 앱 키를 공유.
# 운영 전환 시 별도 Kakao 앱 등록하고 env 로 주입.
kakao:
  rest-api-key: ${KAKAO_REST_API_KEY:}
  client-secret: ${KAKAO_CLIENT_SECRET:}
  # Kakao Developers 콘솔 redirect URI 등록 필요: 개발 시 http://localhost:8081/auth/kakao/callback
  default-redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:8081/auth/kakao/callback}

logging:
  charset:
    console: UTF-8
    file: UTF-8
  level:
    io.skima.byteapp: DEBUG
    org.hibernate.SQL: WARN
