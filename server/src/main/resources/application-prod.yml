# Railway / 운영 환경 — 모든 자격증명은 env 로 주입.
# 활성화: SPRING_PROFILES_ACTIVE=prod
server:
  port: ${PORT:8090}

spring:
  datasource:
    # Railway MySQL — 같은 프로젝트면 mysql.railway.internal:3306, 외부 proxy 면 *.proxy.rlwy.net
    url: jdbc:mysql://${MYSQLHOST}:${MYSQLPORT:3306}/${MYSQLDATABASE:skima_byte}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&useUnicode=true&characterEncoding=UTF-8
    username: ${MYSQLUSER:root}
    password: ${MYSQLPASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5

  jpa:
    hibernate:
      # 데모 — 매 부팅마다 schema 재생성. 운영 단계에선 update + Flyway 로 교체.
      ddl-auto: ${DDL_AUTO:create}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: Asia/Seoul

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Seoul

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

# AWS S3 — env 로 주입. 미설정 시 S3Service 가 isEnabled=false 로 떨어져 사진 업로드만 비활성화 (앱 정상 동작)
cloud:
  aws:
    s3:
      bucket: ${AWS_S3_BUCKET:skimabyte-profile}
      region: ${AWS_S3_REGION:ap-northeast-2}

skima:
  matching:
    sla-minutes: 60
  payout:
    sla-minutes: 30
    auto-approve-minutes: 30
    platform-fee-rate: 0.12
    daily-tax-threshold: 150000
    daily-tax-rate: 0.066
  scheduler:
    payout-trigger-cron: "0 * * * * *"
  seed:
    # 매 부팅 wipe + reseed (데모 모드). false 로 두면 첫 부팅도 시드 안 됨.
    refresh-on-start: ${SEED_REFRESH:true}
    create-shifts-and-apps: ${SEED_SHIFTS:false}
  no-show:
    grace-minutes: 30

# Kakao OAuth — env 미설정 시 카카오 로그인만 비활성화 (앱 정상 동작)
kakao:
  rest-api-key: ${KAKAO_REST_API_KEY:}
  client-secret: ${KAKAO_CLIENT_SECRET:}
  default-redirect-uri: ${KAKAO_REDIRECT_URI:}

# CORS — env CORS_ALLOWED_ORIGINS 콤마 분리 (예: https://skima-client.up.railway.app,https://skima.app)
# 비어있으면 SecurityConfig 가 dev 패턴(localhost:* / 192.168.*) 사용
app:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:https://*.up.railway.app,https://*.railway.app}

logging:
  charset:
    console: UTF-8
  level:
    io.skima.byteapp: INFO
    org.hibernate.SQL: WARN
