<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Skima Expo QR</title>
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
       background:#f7f8fa;margin:0;display:flex;align-items:center;justify-content:center;
       min-height:100vh;color:#1a1a1a;}
  .card{background:#fff;border-radius:16px;padding:36px 40px;box-shadow:0 4px 24px rgba(0,0,0,0.08);
        text-align:center;max-width:480px;}
  h1{margin:0 0 6px;font-size:22px;}
  .sub{color:#777;font-size:13px;margin-bottom:24px;}
  #qrimg{width:320px;height:320px;border-radius:12px;display:block;margin:0 auto;}
  .url{margin-top:18px;font-family:'SF Mono',Consolas,monospace;font-size:14px;color:#444;
       background:#f0f2f5;padding:10px 14px;border-radius:8px;display:inline-block;
       user-select:all;-webkit-user-select:all;}
  ul{text-align:left;font-size:13px;color:#555;line-height:1.7;margin-top:18px;padding-left:20px;}
  .badge{display:inline-block;background:#FEE500;color:#191919;padding:3px 10px;border-radius:12px;
         font-size:11px;font-weight:800;margin-bottom:8px;}
  .fallback{margin-top:14px;font-size:12px;color:#888;}
  .fallback a{color:#3478f6;text-decoration:none;}
</style>
</head>
<body>
<div class="card">
  <div class="badge">SKIMA BYTE · MOBILE</div>
  <h1>Expo Go 로 스캔</h1>
  <div class="sub">폰과 같은 WiFi에서 카메라로 QR 스캔하세요</div>
  <img id="qrimg"
       src="https://api.qrserver.com/v1/create-qr-code/?size=320x320&margin=8&data=exp%3A%2F%2F192.168.0.3%3A8081"
       alt="QR Code">
  <div class="url" id="url">exp://192.168.0.3:8081</div>
  <ul>
    <li>① 폰에 <b>Expo Go</b> 앱 설치</li>
    <li>② 같은 WiFi 연결 확인</li>
    <li>③ Expo Go 실행 → QR 스캔 (또는 "Enter URL manually"로 위 주소 입력)</li>
    <li>④ 첫 빌드 다운로드 30초~1분 → 자동 실행</li>
  </ul>
  <div class="fallback">
    QR이 안 보이면: <a href="https://api.qrserver.com/v1/create-qr-code/?size=320x320&data=exp%3A%2F%2F192.168.0.3%3A8081" target="_blank">직접 열기</a>
    · 또는 위 주소를 Expo Go에서 직접 입력
  </div>
</div>
</body>
</html>
